environment:
  env_id: "ALE/IceHockey-v5"
  n_envs: 8             
  n_stack: 4

training:
  model_name: "ppo_test"
  total_timesteps: 200000  
  eval_freq: 50000
  checkpoint_freq: 10000           

ppo:
  policy: "CnnPolicy"       
  learning_rate: 0.00025     
  n_steps: 128               
  batch_size: 256            
  n_epochs: 4               
  gamma: 0.99               
  gae_lambda: 0.95          
  clip_range: 0.1      
  ent_coef: 0.01        
  vf_coef: 0.5          
  max_grad_norm: 0.5   